<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login | GABRIEL</title>

    <!-- css principal -->
    <link rel="stylesheet" href="css/login.css">

    <!-- framework - botstrap - css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>
    <section id="login" class="login-container section">
        <div id="div-login">
            <form action="login.php" method="POST">

                <h1>LOGIN</h1>

                <label><strong>USUÁRIO:</strong></label>
                <input type="text" name="usuarioLoginCliente" placeholder="Digite seu usuário" required>

                <label><strong>SENHA:</strong></label>
                <input type="password" name="senhaLoginCliente" placeholder="Digite sua senha" required>

                <button id="button-login" type="submit">LOGIN</button>
            </form>

            <a href="#">Esqueceu a senha?</a>
        </div>
    </section>
</body>
</html>
